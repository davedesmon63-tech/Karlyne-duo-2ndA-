window.onload = function(){

function afficherMenu(){
  document.getElementById('jeu').style.display='none';
  document.getElementById('menu').style.display='block';
  let html = '';
  Object.keys(matieres).forEach(k=>{
    html += `<button class="matiere-btn" onclick="choisirMatiere('${k}')">${matieres[k].nom}</button>`;
  });
  document.getElementById('menu').innerHTML = html;
}

function choisirMatiere(m){
  matiereAct = m;
  if(!progress[m]) progress[m] = {};
  let html = `<h2>${matieres[m].nom}</h2>`;
  matieres[m].chapitres.forEach((c,i)=>{
    let locked = i > 0 &&!progress[m][i-1];
    let stars = progress[m][i]? `⭐ ${progress[m][i]}/5` : '';
    html += `<button class="lecon-btn ${locked?'locked':''}" ${locked?'disabled':''} onclick="lancer('${m}',${i})">${c.titre} ${stars}</button>`;
  });
  html += `<br><button class="matiere-btn" onclick="afficherMenu()">⬅️ Retour</button>`;
  document.getElementById('menu').innerHTML = html;
}

function lancer(m,c){
  matiereAct=m; chapAct=c; indexQ=0; score=0; vies=3;
  document.getElementById('menu').style.display='none';
  montrerQuestion();
}
